services:
  - type: web
    name: petadopt-api
    runtime: node
    plan: free
    autoDeployTrigger: commit
    buildCommand: npm ci && npm run db:push
    startCommand: npm run server:start
    healthCheckPath: /api/health
    disk:
      name: petadopt-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        value: file:/var/data/dev.db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: SERVER_PUBLIC_URL
        value: https://petadopt-api.onrender.com
      - key: CLIENT_URL
        value: https://petadopt.netlify.app
      - key: CORS_ORIGINS
        value: https://petadopt.netlify.app
